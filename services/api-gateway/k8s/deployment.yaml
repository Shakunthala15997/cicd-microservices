apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      imagePullSecrets:
      - name: jfrog-secret

      containers:
      - name: api-gateway
        image: image_name
        ports:
        - containerPort: 8080
