apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders

  template:
    metadata:
      labels:
        app: orders

    spec:
      imagePullSecrets:
      - name: jfrog-secret

      containers:
      - name: orders
        image: image_name
        ports:
        - containerPort: 3003
